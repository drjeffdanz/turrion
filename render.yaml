# Render Blueprint — provisions the Turrion API + a managed Postgres in one click.
# In Render: New + > Blueprint > connect this repo > Apply.
databases:
  - name: turrion-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: turrion
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: turrion-db
          property: connectionString
      - key: SEED_ON_START
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"
      # Optional: paste a key in the Render dashboard to enable Claude-powered Ask.
      - key: ANTHROPIC_API_KEY
        sync: false
